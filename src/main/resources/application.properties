server.port=8080

# PostgreSQL connection (adjust as needed)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nevis}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nevis}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nevis}
spring.jpa.hibernate.ddl-auto=update

# Embedding provider (defaults to local Ollama/LocalAI)
embedding.base-url=${EMBEDDING_BASE_URL:http://host.docker.internal:11434/v1/embeddings}
embedding.model=${EMBEDDING_MODEL:nomic-embed-text}
embedding.connect-timeout-ms=${EMBEDDING_CONNECT_TIMEOUT_MS:3000}
embedding.read-timeout-ms=${EMBEDDING_READ_TIMEOUT_MS:15000}
embedding.fallback-enabled=${EMBEDDING_FALLBACK_ENABLED:false}
embedding.fallback-dimensions=${EMBEDDING_FALLBACK_DIMENSIONS:64}
# Optional OpenAI API key if pointing to api.openai.com
openai.api.key=${OPENAI_API_KEY:}

# Swagger UI path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.jpa.open-in-view=false
